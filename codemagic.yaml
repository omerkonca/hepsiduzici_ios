workflows:
  ios-release:
    name: Hepsi Düzici iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: "1. Bagimliliklari Kur"
        script: |
          flutter clean
          flutter pub get
          find ios -name "Podfile" -execdir pod install \;

      - name: "2. Final Build ve IPA Uretimi"
        script: |
          # Codemagic UI otomatik kod imzalama aktif olduğu için ek opsiyonlara gerek kalmadan direkt derliyoruz
          flutter build ipa --release --no-tree-shake-icons

      - name: "3. App Store Connect'e YUKLE (Otomatik)"
        script: |
          # Üretilen IPA dosyasını bul ve yükle
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          echo "Bulunan IPA: $IPA_PATH"
          app-store-connect publish --path "$IPA_PATH"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
