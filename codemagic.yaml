workflows:
  ios-release:
    name: Hepsi Düzici iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials # Codemagic UI'da tanımladığımız çevre değişkenleri grubu
      vars:
        APP_ID: "net.hepsiduzici.hepsiDuzici"
        TEAM_ID: "7RJ993N2DP" # Aynı Apple Developer hesabı olduğu için Team ID aynı kalıyor
    scripts:
      - name: "1. Sertifikalari Indir ve Kur"
        script: |
          keychain initialize
          
          # Apple Developer Portal'dan sertifika ve provizyon profillerini çeker
          app-store-connect fetch-signing-files "$APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create
            
          # İndirilen sertifikaları anahtar zincirine (keychain) ekler (Önceki hatayı çözen kritik adım!)
          keychain add-certificates

      - name: "2. Bagimliliklari Kur"
        script: |
          flutter clean
          flutter pub get
          find ios -name "Podfile" -execdir pod install \;

      - name: "3. Profilleri Projeye Bagla"
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: "4. Final Build ve IPA Uretimi"
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist \
            --no-tree-shake-icons

      - name: "5. App Store Connect'e YUKLE (Otomatik)"
        script: |
          # Üretilen IPA dosyasını bul
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          
          echo "Bulunan IPA: $IPA_PATH"
          
          # TestFlight'a yüklemeyi başlatır
          app-store-connect publish --path "$IPA_PATH" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
