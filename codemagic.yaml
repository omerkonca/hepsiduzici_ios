workflows:
  ios-release:
    name: Hepsi Düzici iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      groups:
        - codemagic # Takibattaki çevre grubu adını kullanıyoruz
      vars:
        APP_ID: "net.hepsiduzici.hepsiDuzici"
        TEAM_ID: "7RJ993N2DP"
    scripts:
      - name: "1. Sertifikalari Indir"
        script: |
          keychain initialize
          # Global entegrasyonu kullanarak sertifika üretir/indirir (Parametresiz çalışan hali!)
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          keychain add-certificates

      - name: "2. Bagimliliklari Kur"
        script: |
          flutter clean
          flutter pub get
          find ios -name "Podfile" -execdir pod install \;

      - name: "3. Profilleri Bagla"
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: "4. Final Build ve IPA Uretimi"
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist \
            --no-tree-shake-icons

      - name: "5. App Store Connect'e YUKLE (Otomatik)"
        script: |
          # Üretilen IPA dosyasını bul ve yükle
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          echo "Bulunan IPA: $IPA_PATH"
          
          # TestFlight'a yüklemeyi başlatır
          app-store-connect publish --path "$IPA_PATH"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
