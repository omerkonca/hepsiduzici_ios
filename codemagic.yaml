workflows:
  ios-release:
    name: Hepsi Düzici iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
      vars:
        APP_ID: "net.hepsiduzici.hepsiDuzici"
        TEAM_ID: "7RJ993N2DP"
      ios_signing:
        distribution_type: app_store # Apple Store dağıtımı için App Store seçildi
        bundle_identifier: "net.hepsiduzici.hepsiDuzici" # Projenin Bundle ID'si
    scripts:
      - name: "0. Firebase plist (secret)"
        script: |
          bash scripts/codemagic-firebase-plist.sh

      - name: "1. Bagimliliklari Kur"
        script: |
          flutter config --no-enable-swift-package-manager
          flutter clean
          flutter pub get
          flutter build ios --config-only --no-codesign
          cd ios && pod install --repo-update

      - name: "2. Push profili yenile ve bagla"
        script: |
          app-store-connect fetch-signing-files "$APP_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --create
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: "3. Final Build ve IPA Uretimi"
        script: |
          # export_options.plist dosyamız üstteki adım sayesinde başarıyla oluştu!
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist \
            --no-tree-shake-icons

      - name: "4. App Store Connect'e YUKLE (Otomatik)"
        script: |
          # Üretilen IPA dosyasını bul ve yükle
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          echo "Bulunan IPA: $IPA_PATH"
          
          app-store-connect publish --path "$IPA_PATH" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
