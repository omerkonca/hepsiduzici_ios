workflows:
  ios-release:
    name: Hepsi Düzici iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
      vars:
        APP_ID: "net.hepsiduzici.hepsiDuzici"
        TEAM_ID: "7RJ993N2DP"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "net.hepsiduzici.hepsiDuzici"
    scripts:
      - name: "1. Firebase plist (secret)"
        script: |
          bash scripts/codemagic-firebase-plist.sh

      - name: "2. Bagimliliklari Kur"
        script: |
          flutter config --no-enable-swift-package-manager
          flutter clean
          flutter pub get
          flutter build ios --config-only --no-codesign
          cd ios && pod install --repo-update

      - name: "3. Profilleri projeye bagla"
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: "4. Final Build ve IPA Uretimi"
        script: |
          EXPORT_PLIST="/Users/builder/export_options.plist"
          if [ ! -f "$EXPORT_PLIST" ]; then
            EXPORT_PLIST="ios/export_options.plist"
          fi
          flutter build ipa --release \
            --export-options-plist="$EXPORT_PLIST" \
            --no-tree-shake-icons

      - name: "5. App Store Connect'e YUKLE (Otomatik)"
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          echo "Bulunan IPA: $IPA_PATH"

          app-store-connect publish --path "$IPA_PATH" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
